name: Prevent regressions (Conversas & Leads)

on:
  push:
    branches: [ main, chore/lovable-** ]
  pull_request:
    branches: [ main ]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Run regression checks
        run: node scripts/check-regressions.js


